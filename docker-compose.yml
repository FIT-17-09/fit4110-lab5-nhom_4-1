version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fit4110-db-lab05
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: fit4110-ai-lab05
    restart: unless-stopped
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8000"
    environment:
      APP_PORT: 8000
      SERVICE_VERSION: ${SERVICE_VERSION}
      AUTH_TOKEN: ${AUTH_TOKEN}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai-service:9000
    networks:
      - team-internal
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy

networks:
  team-internal:
    driver: bridge

volumes:
  db_data: